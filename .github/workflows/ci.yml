name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run unit tests
      run: |
        python -m pytest test_app.py -v
    - name: Run integration tests
      run: |
        python -m flask run & sleep 5 && curl http://localhost:5000
    - name: Login no DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and Push Docker Image
      run: |
        docker build -t andrercdev/minha-app-python:latest .
        docker push andrercdev/minha-app-python:latest
    - name: Notify Slack on Success or Failure
      if: always()
      uses: slackapi/slack-github-action@v1.27.0
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      with:
        payload: |
          {
            "channel": "ci-notifications",
            "text": "Workflow CI ${{ job.status }} for ${{ github.repository }} at ${{ github.sha }}"
          }